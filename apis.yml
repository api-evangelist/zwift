aid: zwift
name: Zwift
description: >-
  Zwift is a Long Beach, California online fitness company that operates a
  multiplayer indoor cycling and running platform combining stationary smart
  trainers and bikes with a 3D virtual-world game client. Riders and runners
  use a smart trainer, smart bike (such as the in-house Zwift Ride), treadmill,
  or pod to drive an avatar through fictional worlds (Watopia, Makuri Islands)
  and licensed real-world routes, joining structured workouts, group rides,
  races, training plans, and 24/7 events alongside a global community of
  more than a million members. The platform pairs with smart trainers and
  heart-rate monitors over Bluetooth and ANT+, and the Zwift Companion mobile
  app provides in-game messaging, ride control, and route discovery. Zwift
  does not operate a general public developer portal, OpenAPI reference, or
  open-source SDK. Its developer surface is limited to a private,
  application-only Structured Training API for approved training partners
  (TrainingPeaks, TrainerRoad, Wahoo SYSTM, JOIN Cycling and similar coaching
  platforms) that lets external workout builders push custom workouts into a
  rider's Zwift account, plus one-way activity-export connections to Strava,
  TrainingPeaks, Garmin Connect, MapMyRide, MapMyRun, Adidas Running,
  Technogym, Fitbit, Wahoo, Apple Health, and Withings. There is no public
  REST surface, OAuth client registration, or partner self-service available
  to general developers — third-party tools (community libraries, ZwiftPower,
  Sauce for Zwift) interact with Zwift via reverse-engineered private
  endpoints, not a sanctioned API. Zwift is a paid consumer subscription
  business; revenue comes from monthly memberships and hardware sales
  (Zwift Ride, Zwift Cog, Zwift Click, Zwift Play).
